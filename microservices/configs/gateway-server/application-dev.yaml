spring:
    cloud:
        gateway:
            routes:
                - id: user-service
                  uri: lb://user-service
                  predicates:
                    - Path=/api/users/**
                - id: product-service
                  uri: lb://product-service
                  predicates:
                    - Path=/api/products/**

server:
    port: 8889

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        fetch-registry: true
        register-with-eureka: true

management:
    endpoints:
        web:
            exposure:
                include: "*"
