spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/microservices-gygy5
  cloud:
    function:
      definition: orderCreatedEventProducer
    stream:
      bindings:
        orderCreatedEventProducer-out-0:
          destination: order-created-topic
          content-type: application/json
      kafka:
        binder:
          brokers: localhost:9092

server:
  port: 8087

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
