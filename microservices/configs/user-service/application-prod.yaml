spring:
  cloud:
    function:
      definition: consumeTestEvent
    stream:
      bindings:
        consumeTestEvent-in-0:
          destination: test-topic
          group: user-service-group
      kafka:
        binder:
          brokers: prod.turkcell.com:9092
  datasource:
    url: jdbc:postgresql://prod.turkcell.com:5434/users
    username: postgres
    password: turkcellprod
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://prod.turkcell.com:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
