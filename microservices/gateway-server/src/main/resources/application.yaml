spring:
  application:
    name: gateway-server
  profiles:
    active: dev
  config:
    import: "optional:configserver:http://localhost:8888"

server:
  port: 8888

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        fetch-registry: true
        register-with-eureka: true

